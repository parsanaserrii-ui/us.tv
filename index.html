<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>US TV | تماشای آنلاین فیلم و سریال</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Vazirmatn', sans-serif;
      background:#0d0d0d;
      color:#fff;
    }
    header{
      background:#111;
      padding:20px;
      font-size:26px;
      text-align:center;
      font-weight:700;
    }
    nav{
      background:#1a1a1a;
      display:flex;
      justify-content:center;
      gap:20px;
      padding:10px;
      flex-wrap:wrap;
    }
    nav a{
      color:#fff;
      text-decoration:none;
      padding:8px 14px;
    }
    nav a:hover{
      background:#ff3d00;
      border-radius:6px;
    }
    .section{
      padding:25px;
    }
    .section h2{
      border-right:5px solid #ff3d00;
      padding-right:10px;
      margin-bottom:20px;
    }
    .movies{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }
    .card{
      background:#1b1b1b;
      border-radius:12px;
      overflow:hidden;
      transition:transform .3s;
    }
    .card:hover{
      transform:scale(1.05);
    }
    .card img{
      width:100%;
      display:block;
    }
    .card h3{
      font-size:16px;
      padding:10px;
    }
    .card p{
      font-size:13px;
      padding:0 10px 10px;
      color:#ccc;
    }
    footer{
      background:#111;
      text-align:center;
      padding:15px;
      font-size:13px;
      color:#aaa;
    }
  </style>
</head>

<body>

<header>🎬 US TV – تماشای آنلاین فیلم و سریال</header>

<nav>
  <a href="#">فیلم</a>
  <a href="#">سریال</a>
  <a href="#">کودک</a>
  <a href="#">درباره ما</a>
</nav>

<div class="section">
  <h2>فیلم‌های پیشنهادی</h2>

  <div class="movies">

    <a href="movie.html" style="text-decoration:none;color:white;">
  <div class="card">
      <img src="https://i.imgur.com/7b1dH2P.jpg">
      <h3>Big Buck Bunny</h3>
      <p>انیمیشن | خانوادگی</p>
  </div>
</a>

    <a href="movie-sintel.html" style="text-decoration:none;color:white;">
  <div class="card">
      <img src="https://i.imgur.com/Wq6KX7M.jpg">
      <h3>Sintel</h3>
      <p>فانتزی | ماجراجویی</p>
  </div>
</a>

    <div class="card">
      <img src="https://i.imgur.com/XC6mY5D.jpg">
      <h3>Tears of Steel</h3>
      <p>علمی تخیلی | درام</p>
    </div>

  </div>
</div>

<footer>
© 2025 US TV – نسخه آزمایشی
</footer>

</body>
</html>
